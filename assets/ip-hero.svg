<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 420" font-family="'Inter', sans-serif">
  <defs>
    <filter id="wIP"><feTurbulence baseFrequency="0.022" numOctaves="2" seed="55"/><feDisplacementMap in="SourceGraphic" scale="1.4"/></filter>
    <radialGradient id="glowIP" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#5FE388" stop-opacity="0.40"/>
      <stop offset="100%" stop-color="#5FE388" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <circle cx="300" cy="210" r="190" fill="url(#glowIP)"/>

  <!-- Whiteboard / interview room -->
  <g filter="url(#wIP)" stroke-width="3" fill="none" stroke-linecap="round">
    <rect x="100" y="80"  width="400" height="220" rx="10" stroke="#3DD9D6"/>
    <!-- whiteboard squiggles -->
    <path d="M130 130 q40 -10 80 0 q40 10 80 -10" stroke="#FFD93D"/>
    <path d="M130 165 q60 20 130 0"  stroke="#FF8C42"/>
    <path d="M130 200 q80 -20 150 10" stroke="#5FE388"/>
    <path d="M130 235 q40 0 80 -10"  stroke="#B388FF"/>
    <!-- arrow on board -->
    <circle cx="380" cy="160" r="30" stroke="#FF7AB6"/>
    <circle cx="380" cy="160" r="14" stroke="#FF7AB6"/>
    <path d="M380 130 L380 110" stroke="#FF7AB6"/>
    <polygon points="380,110 374,120 386,120" fill="#FF7AB6" stroke="none"/>
  </g>

  <!-- Interviewer + candidate stick figures -->
  <g filter="url(#wIP)" stroke="#9AA7BD" stroke-width="2.5" fill="none">
    <!-- interviewer -->
    <circle cx="160" cy="340" r="16" stroke="#FF8C42"/>
    <line x1="160" y1="356" x2="160" y2="395" stroke="#FF8C42"/>
    <line x1="160" y1="370" x2="140" y2="385" stroke="#FF8C42"/>
    <line x1="160" y1="370" x2="180" y2="385" stroke="#FF8C42"/>
    <!-- candidate -->
    <circle cx="440" cy="340" r="16" stroke="#3DD9D6"/>
    <line x1="440" y1="356" x2="440" y2="395" stroke="#3DD9D6"/>
    <line x1="440" y1="370" x2="420" y2="385" stroke="#3DD9D6"/>
    <line x1="440" y1="370" x2="460" y2="385" stroke="#3DD9D6"/>
    <!-- speech bubbles -->
    <ellipse cx="220" cy="338" rx="32" ry="14" stroke="#FF8C42"/>
    <ellipse cx="380" cy="338" rx="32" ry="14" stroke="#3DD9D6"/>
  </g>
  <g font-family="'JetBrains Mono', monospace" font-size="11" text-anchor="middle">
    <text x="220" y="342" fill="#FF8C42">"so..."</text>
    <text x="380" y="342" fill="#3DD9D6">"hmm"</text>
  </g>
</svg>
