<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 420" font-family="'Caveat', cursive">
  <defs>
    <filter id="w1" x="-5%" y="-5%" width="110%" height="110%">
      <feTurbulence type="fractalNoise" baseFrequency="0.018" numOctaves="2" seed="3"/>
      <feDisplacementMap in="SourceGraphic" scale="1.6"/>
    </filter>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#3DD9D6" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#3DD9D6" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <circle cx="300" cy="210" r="190" fill="url(#glow)"/>

  <g filter="url(#w1)" fill="none" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
    <!-- big brain outline -->
    <path d="M170 200 q-30 -90 80 -110 q70 -20 110 30 q60 -10 70 60 q40 30 0 90 q10 70 -70 80 q-50 50 -120 10 q-90 0 -90 -70 q-30 -40 20 -90 z" stroke="#3DD9D6"/>
    <!-- inner squiggles -->
    <path d="M210 180 q40 -10 70 20 q30 30 80 0" stroke="#FF8C42"/>
    <path d="M210 240 q60 40 130 0" stroke="#FF8C42"/>
    <path d="M260 290 q40 -10 80 20" stroke="#B388FF"/>
    <!-- nodes -->
    <circle cx="220" cy="180" r="6" fill="#FFD93D" stroke="#FFD93D"/>
    <circle cx="380" cy="180" r="6" fill="#5FE388" stroke="#5FE388"/>
    <circle cx="300" cy="260" r="6" fill="#FF7AB6" stroke="#FF7AB6"/>
    <circle cx="240" cy="320" r="6" fill="#3DD9D6" stroke="#3DD9D6"/>
    <circle cx="350" cy="310" r="6" fill="#FF8C42" stroke="#FF8C42"/>
    <!-- connections -->
    <path d="M220 180 L300 260 L380 180" stroke="#9AA7BD" stroke-dasharray="4 4"/>
    <path d="M240 320 L300 260 L350 310" stroke="#9AA7BD" stroke-dasharray="4 4"/>
  </g>

  <!-- mini code orbiting -->
  <g font-family="'JetBrains Mono', monospace" font-size="14" fill="#9AA7BD">
    <text x="60"  y="60"  fill="#3DD9D6">O(log n)</text>
    <text x="490" y="80"  fill="#FF8C42">O(n)</text>
    <text x="40"  y="380" fill="#FFD93D">DFS</text>
    <text x="490" y="380" fill="#5FE388">BFS</text>
    <text x="280" y="40"  fill="#B388FF">while(l&lt;r)</text>
    <text x="270" y="400" fill="#FF7AB6">dp[i]</text>
  </g>
</svg>
