<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 420" font-family="'Inter', sans-serif">
  <defs>
    <filter id="wSD"><feTurbulence baseFrequency="0.022" numOctaves="2" seed="41"/><feDisplacementMap in="SourceGraphic" scale="1.4"/></filter>
    <radialGradient id="glowSD" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FF8C42" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#FF8C42" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <circle cx="300" cy="210" r="200" fill="url(#glowSD)"/>

  <!-- Cloud + servers stack -->
  <g filter="url(#wSD)" stroke-width="3" fill="none" stroke-linecap="round">
    <!-- Client -->
    <rect x="60"  y="90"  width="100" height="60" rx="6" stroke="#3DD9D6"/>
    <!-- API gateway -->
    <rect x="220" y="90"  width="160" height="60" rx="6" stroke="#FFD93D"/>
    <!-- Services -->
    <rect x="440" y="40"  width="110" height="50" rx="6" stroke="#FF8C42"/>
    <rect x="440" y="110" width="110" height="50" rx="6" stroke="#FF8C42"/>
    <rect x="440" y="180" width="110" height="50" rx="6" stroke="#FF8C42"/>
    <!-- DBs -->
    <ellipse cx="200" cy="300" rx="60" ry="20" stroke="#5FE388"/>
    <path d="M140 300 L140 360 Q200 380 260 360 L260 300" stroke="#5FE388"/>
    <ellipse cx="200" cy="360" rx="60" ry="20" stroke="#5FE388"/>

    <ellipse cx="400" cy="320" rx="60" ry="20" stroke="#B388FF"/>
    <path d="M340 320 L340 370 Q400 388 460 370 L460 320" stroke="#B388FF"/>
    <ellipse cx="400" cy="370" rx="60" ry="20" stroke="#B388FF"/>

    <!-- Connections -->
    <path d="M160 120 L220 120" stroke="#9AA7BD"/>
    <path d="M380 120 L440 65"  stroke="#9AA7BD"/>
    <path d="M380 120 L440 135" stroke="#9AA7BD"/>
    <path d="M380 120 L440 205" stroke="#9AA7BD"/>
    <path d="M495 160 Q400 230 250 290" stroke="#9AA7BD" stroke-dasharray="4 4"/>
    <path d="M495 230 Q420 280 400 300" stroke="#9AA7BD" stroke-dasharray="4 4"/>
  </g>

  <g font-family="'Caveat', cursive" font-size="20" text-anchor="middle">
    <text x="110" y="130" fill="#3DD9D6">client</text>
    <text x="300" y="130" fill="#FFD93D">API gateway</text>
    <text x="495" y="72"  fill="#FF8C42">auth-svc</text>
    <text x="495" y="142" fill="#FF8C42">order-svc</text>
    <text x="495" y="212" fill="#FF8C42">feed-svc</text>
    <text x="200" y="406" fill="#5FE388">SQL</text>
    <text x="400" y="406" fill="#B388FF">cache</text>
  </g>
</svg>
