<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 460" font-family="'Inter', sans-serif">
  <defs>
    <filter id="wCAP"><feTurbulence baseFrequency="0.025" numOctaves="2" seed="43"/><feDisplacementMap in="SourceGraphic" scale="1.3"/></filter>
  </defs>

  <text x="300" y="34" font-family="'Caveat', cursive" font-size="28" fill="#B388FF" text-anchor="middle">CAP - pick two when network splits</text>

  <!-- Triangle -->
  <polygon points="300,80 100,400 500,400" filter="url(#wCAP)" stroke="#9AA7BD" stroke-width="3" fill="rgba(0,0,0,0.18)"/>

  <!-- Edge labels (each edge = a "pair") -->
  <g font-family="'Caveat', cursive" font-size="22">
    <text x="170" y="230" fill="#3DD9D6" text-anchor="middle">CP</text>
    <text x="430" y="230" fill="#FF8C42" text-anchor="middle">AP</text>
    <text x="300" y="430" fill="#5FE388" text-anchor="middle">CA  (single node)</text>
  </g>

  <!-- Corners -->
  <g stroke-width="3">
    <circle cx="300" cy="80"  r="34" fill="#3DD9D6" stroke="#3DD9D6"/>
    <circle cx="100" cy="400" r="34" fill="#FF8C42" stroke="#FF8C42"/>
    <circle cx="500" cy="400" r="34" fill="#5FE388" stroke="#5FE388"/>
  </g>
  <g font-family="'Inter', sans-serif" font-weight="700" font-size="20" fill="#0F1A2E" text-anchor="middle">
    <text x="300" y="86">C</text>
    <text x="100" y="406">A</text>
    <text x="500" y="406">P</text>
  </g>
  <g font-family="'Caveat', cursive" font-size="20" text-anchor="middle">
    <text x="300" y="45" fill="#3DD9D6">Consistency</text>
    <text x="100" y="450" fill="#FF8C42">Availability</text>
    <text x="500" y="450" fill="#5FE388">Partition tolerance</text>
  </g>

  <!-- Example DBs at sides -->
  <g font-family="'JetBrains Mono', monospace" font-size="12" fill="#9AA7BD">
    <text x="190" y="190" text-anchor="middle">HBase</text>
    <text x="190" y="206" text-anchor="middle">MongoDB</text>
    <text x="410" y="190" text-anchor="middle">Cassandra</text>
    <text x="410" y="206" text-anchor="middle">DynamoDB</text>
    <text x="300" y="395" text-anchor="middle">PostgreSQL (single)</text>
  </g>
</svg>
