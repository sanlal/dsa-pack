<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 400" font-family="'Inter', sans-serif">
  <defs>
    <filter id="wMS"><feTurbulence baseFrequency="0.025" numOctaves="2" seed="51"/><feDisplacementMap in="SourceGraphic" scale="1.3"/></filter>
  </defs>

  <text x="360" y="34" font-family="'Caveat', cursive" font-size="28" fill="#B388FF" text-anchor="middle">Microservices - small, owned, independently deployed</text>

  <!-- Gateway -->
  <g filter="url(#wMS)">
    <rect x="280" y="70" width="160" height="50" rx="8" fill="rgba(255,217,61,0.15)" stroke="#FFD93D" stroke-width="3"/>
  </g>
  <text x="360" y="102" font-family="'Caveat', cursive" font-size="22" fill="#FFD93D" text-anchor="middle">API gateway</text>

  <!-- Services row -->
  <g filter="url(#wMS)" stroke-width="2.5">
    <rect x="60"  y="170" width="120" height="60" rx="8" fill="rgba(61,217,214,0.12)" stroke="#3DD9D6"/>
    <rect x="200" y="170" width="120" height="60" rx="8" fill="rgba(255,140,66,0.12)" stroke="#FF8C42"/>
    <rect x="340" y="170" width="120" height="60" rx="8" fill="rgba(95,227,136,0.12)" stroke="#5FE388"/>
    <rect x="480" y="170" width="120" height="60" rx="8" fill="rgba(255,122,182,0.12)" stroke="#FF7AB6"/>
  </g>
  <g font-family="'Caveat', cursive" font-size="20" text-anchor="middle">
    <text x="120" y="208" fill="#3DD9D6">auth</text>
    <text x="260" y="208" fill="#FF8C42">orders</text>
    <text x="400" y="208" fill="#5FE388">payments</text>
    <text x="540" y="208" fill="#FF7AB6">notify</text>
  </g>

  <!-- Gateway arrows -->
  <g stroke="#9AA7BD" stroke-width="1.5" fill="none">
    <path d="M310 120 L150 170"/>
    <path d="M340 120 L260 170"/>
    <path d="M380 120 L400 170"/>
    <path d="M410 120 L520 170"/>
  </g>

  <!-- Each service owns its DB -->
  <g filter="url(#wMS)" stroke-width="2.5" fill="none">
    <ellipse cx="120" cy="280" rx="42" ry="14" stroke="#3DD9D6"/>
    <path d="M78 280 L78 320 Q120 332 162 320 L162 280" stroke="#3DD9D6"/>
    <ellipse cx="120" cy="320" rx="42" ry="12" stroke="#3DD9D6"/>

    <ellipse cx="260" cy="280" rx="42" ry="14" stroke="#FF8C42"/>
    <path d="M218 280 L218 320 Q260 332 302 320 L302 280" stroke="#FF8C42"/>
    <ellipse cx="260" cy="320" rx="42" ry="12" stroke="#FF8C42"/>

    <ellipse cx="400" cy="280" rx="42" ry="14" stroke="#5FE388"/>
    <path d="M358 280 L358 320 Q400 332 442 320 L442 280" stroke="#5FE388"/>
    <ellipse cx="400" cy="320" rx="42" ry="12" stroke="#5FE388"/>

    <ellipse cx="540" cy="280" rx="42" ry="14" stroke="#FF7AB6"/>
    <path d="M498 280 L498 320 Q540 332 582 320 L582 280" stroke="#FF7AB6"/>
    <ellipse cx="540" cy="320" rx="42" ry="12" stroke="#FF7AB6"/>
  </g>

  <g stroke="#9AA7BD" stroke-width="1.5" stroke-dasharray="3 3" fill="none">
    <line x1="120" y1="230" x2="120" y2="266"/>
    <line x1="260" y1="230" x2="260" y2="266"/>
    <line x1="400" y1="230" x2="400" y2="266"/>
    <line x1="540" y1="230" x2="540" y2="266"/>
  </g>

  <!-- Event bus -->
  <g filter="url(#wMS)">
    <rect x="60" y="360" width="540" height="30" rx="14" fill="rgba(179,136,255,0.12)" stroke="#B388FF" stroke-width="2.5"/>
  </g>
  <text x="330" y="382" font-family="'Caveat', cursive" font-size="18" fill="#B388FF" text-anchor="middle">event bus  (Kafka)  - publishes order_placed, payment_done...</text>

  <text x="640" y="194" font-family="'Caveat', cursive" font-size="14" fill="#9AA7BD">own DB</text>
  <text x="640" y="208" font-family="'Caveat', cursive" font-size="14" fill="#9AA7BD">per service</text>
</svg>
