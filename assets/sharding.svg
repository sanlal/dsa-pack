<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 380" font-family="'Inter', sans-serif">
  <defs>
    <filter id="wSh"><feTurbulence baseFrequency="0.025" numOctaves="2" seed="49"/><feDisplacementMap in="SourceGraphic" scale="1.3"/></filter>
  </defs>

  <text x="360" y="34" font-family="'Caveat', cursive" font-size="28" fill="#B388FF" text-anchor="middle">Sharding - split data by key</text>

  <!-- App -->
  <g filter="url(#wSh)">
    <rect x="60" y="140" width="120" height="60" rx="8" fill="rgba(61,217,214,0.15)" stroke="#3DD9D6" stroke-width="3"/>
  </g>
  <text x="120" y="178" font-family="'Caveat', cursive" font-size="22" fill="#3DD9D6" text-anchor="middle">user-svc</text>

  <!-- Router -->
  <g filter="url(#wSh)">
    <rect x="240" y="140" width="140" height="60" rx="8" fill="rgba(255,217,61,0.15)" stroke="#FFD93D" stroke-width="3"/>
  </g>
  <text x="310" y="172" font-family="'Caveat', cursive" font-size="20" fill="#FFD93D" text-anchor="middle">hash(user_id) % 3</text>
  <text x="310" y="192" font-family="'JetBrains Mono', monospace" font-size="11" fill="#FFD93D" text-anchor="middle">(or consistent hash)</text>

  <!-- Arrows -->
  <g stroke="#9AA7BD" stroke-width="2" fill="none">
    <path d="M180 170 L240 170" marker-end="url(#aSh)"/>
    <path d="M380 160 L500 90"  marker-end="url(#aSh)"/>
    <path d="M380 170 L500 170" marker-end="url(#aSh)"/>
    <path d="M380 180 L500 250" marker-end="url(#aSh)"/>
  </g>
  <defs>
    <marker id="aSh" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0 0 L10 5 L0 10 z" fill="#9AA7BD"/>
    </marker>
  </defs>

  <!-- Shards (cylinder-ish) -->
  <g filter="url(#wSh)" stroke-width="3" fill="none">
    <ellipse cx="560" cy="80"  rx="60" ry="18" stroke="#5FE388"/>
    <path d="M500 80 L500 130 Q560 145 620 130 L620 80" stroke="#5FE388"/>
    <ellipse cx="560" cy="130" rx="60" ry="15" stroke="#5FE388"/>

    <ellipse cx="560" cy="170" rx="60" ry="18" stroke="#FF8C42"/>
    <path d="M500 170 L500 220 Q560 235 620 220 L620 170" stroke="#FF8C42"/>
    <ellipse cx="560" cy="220" rx="60" ry="15" stroke="#FF8C42"/>

    <ellipse cx="560" cy="260" rx="60" ry="18" stroke="#FF7AB6"/>
    <path d="M500 260 L500 310 Q560 325 620 310 L620 260" stroke="#FF7AB6"/>
    <ellipse cx="560" cy="310" rx="60" ry="15" stroke="#FF7AB6"/>
  </g>

  <g font-family="'JetBrains Mono', monospace" font-size="14" text-anchor="middle">
    <text x="560" y="105" fill="#5FE388">shard-0  (ids %3 == 0)</text>
    <text x="560" y="195" fill="#FF8C42">shard-1  (ids %3 == 1)</text>
    <text x="560" y="285" fill="#FF7AB6">shard-2  (ids %3 == 2)</text>
  </g>

  <text x="360" y="365" font-family="'Caveat', cursive" font-size="18" fill="#9AA7BD" text-anchor="middle">scales writes horizontally; cross-shard queries get painful</text>
</svg>
