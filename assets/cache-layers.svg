<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 360" font-family="'Inter', sans-serif">
  <defs>
    <filter id="wC"><feTurbulence baseFrequency="0.025" numOctaves="2" seed="47"/><feDisplacementMap in="SourceGraphic" scale="1.3"/></filter>
  </defs>

  <text x="360" y="34" font-family="'Caveat', cursive" font-size="28" fill="#B388FF" text-anchor="middle">Caches - each layer absorbs more traffic</text>

  <g filter="url(#wC)" stroke-width="3">
    <rect x="60"  y="100" width="120" height="160" rx="10" fill="rgba(61,217,214,0.10)" stroke="#3DD9D6"/>
    <rect x="200" y="100" width="120" height="160" rx="10" fill="rgba(255,217,61,0.10)" stroke="#FFD93D"/>
    <rect x="340" y="100" width="120" height="160" rx="10" fill="rgba(255,140,66,0.10)" stroke="#FF8C42"/>
    <rect x="480" y="100" width="120" height="160" rx="10" fill="rgba(179,136,255,0.10)" stroke="#B388FF"/>
    <rect x="620" y="100" width="80"  height="160" rx="10" fill="rgba(95,227,136,0.10)"  stroke="#5FE388"/>
  </g>

  <g font-family="'Caveat', cursive" font-size="22" text-anchor="middle">
    <text x="120" y="135" fill="#3DD9D6">Browser</text>
    <text x="260" y="135" fill="#FFD93D">CDN</text>
    <text x="400" y="135" fill="#FF8C42">App</text>
    <text x="540" y="135" fill="#B388FF">Redis</text>
    <text x="660" y="135" fill="#5FE388">DB</text>
  </g>
  <g font-family="'JetBrains Mono', monospace" font-size="11" fill="#9AA7BD" text-anchor="middle">
    <text x="120" y="160">localStorage</text>
    <text x="120" y="175">service worker</text>
    <text x="260" y="160">Cloudflare</text>
    <text x="260" y="175">Akamai</text>
    <text x="400" y="160">in-process</text>
    <text x="400" y="175">LRU</text>
    <text x="540" y="160">Memcached</text>
    <text x="540" y="175">Redis</text>
    <text x="660" y="160">truth</text>
    <text x="660" y="175">slow</text>
  </g>

  <g font-family="'JetBrains Mono', monospace" font-size="13" text-anchor="middle">
    <text x="120" y="225" fill="#3DD9D6">~1 ms</text>
    <text x="260" y="225" fill="#FFD93D">~10 ms</text>
    <text x="400" y="225" fill="#FF8C42">~0.1 ms</text>
    <text x="540" y="225" fill="#B388FF">~1 ms</text>
    <text x="660" y="225" fill="#5FE388">~50 ms</text>
  </g>

  <!-- Arrows -->
  <g stroke="#9AA7BD" stroke-width="2" fill="none">
    <path d="M180 180 L200 180" marker-end="url(#ac)"/>
    <path d="M320 180 L340 180" marker-end="url(#ac)"/>
    <path d="M460 180 L480 180" marker-end="url(#ac)"/>
    <path d="M600 180 L620 180" marker-end="url(#ac)"/>
  </g>
  <defs>
    <marker id="ac" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0 0 L10 5 L0 10 z" fill="#9AA7BD"/>
    </marker>
  </defs>

  <text x="360" y="310" font-family="'Caveat', cursive" font-size="20" fill="#9AA7BD" text-anchor="middle">on miss, ask the next layer.  on write, invalidate or expire (TTL).</text>
</svg>
