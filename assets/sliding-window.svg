<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 300" font-family="'Inter', sans-serif">
  <defs>
    <filter id="w4"><feTurbulence baseFrequency="0.03" numOctaves="2" seed="11"/><feDisplacementMap in="SourceGraphic" scale="1.2"/></filter>
  </defs>

  <!-- Array -->
  <g filter="url(#w4)" stroke="#9AA7BD" stroke-width="2" fill="rgba(0,0,0,0.18)">
    <rect x="40"  y="120" width="60" height="60"/>
    <rect x="100" y="120" width="60" height="60"/>
    <rect x="160" y="120" width="60" height="60"/>
    <rect x="220" y="120" width="60" height="60"/>
    <rect x="280" y="120" width="60" height="60"/>
    <rect x="340" y="120" width="60" height="60"/>
    <rect x="400" y="120" width="60" height="60"/>
    <rect x="460" y="120" width="60" height="60"/>
    <rect x="520" y="120" width="60" height="60"/>
    <rect x="580" y="120" width="60" height="60"/>
    <rect x="640" y="120" width="60" height="60"/>
  </g>

  <g font-family="'JetBrains Mono', monospace" font-size="22" fill="#F4F1E8" text-anchor="middle">
    <text x="70"  y="158">2</text>
    <text x="130" y="158">1</text>
    <text x="190" y="158">5</text>
    <text x="250" y="158">1</text>
    <text x="310" y="158">3</text>
    <text x="370" y="158">2</text>
    <text x="430" y="158">7</text>
    <text x="490" y="158">2</text>
    <text x="550" y="158">1</text>
    <text x="610" y="158">3</text>
    <text x="670" y="158">5</text>
  </g>

  <!-- Window highlight (covers 5 boxes) -->
  <rect x="156" y="110" width="304" height="80" rx="10" stroke="#FFD93D" stroke-width="4" fill="rgba(255,217,61,0.10)" filter="url(#w4)"/>

  <!-- L and R markers -->
  <text x="190" y="100" font-family="'Caveat', cursive" font-size="22" fill="#3DD9D6" text-anchor="middle">L</text>
  <text x="430" y="100" font-family="'Caveat', cursive" font-size="22" fill="#FF8C42" text-anchor="middle">R</text>

  <!-- expansion arrows -->
  <g stroke="#5FE388" stroke-width="2.5" fill="none">
    <path d="M430 220 q40 30 80 0" filter="url(#w4)"/>
    <polygon points="510,220 503,212 508,228" fill="#5FE388"/>
  </g>
  <text x="475" y="262" font-family="'Caveat', cursive" font-size="20" fill="#5FE388" text-anchor="middle">expand R while valid</text>

  <g stroke="#FF7AB6" stroke-width="2.5" fill="none">
    <path d="M190 220 q40 30 80 0" filter="url(#w4)"/>
    <polygon points="270,220 263,212 268,228" fill="#FF7AB6"/>
  </g>
  <text x="225" y="262" font-family="'Caveat', cursive" font-size="20" fill="#FF7AB6" text-anchor="middle">shrink L when invalid</text>

  <text x="360" y="50" font-family="'Caveat', cursive" font-size="26" fill="#B388FF" text-anchor="middle">A window slides across the array</text>
</svg>
