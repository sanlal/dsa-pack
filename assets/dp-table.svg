<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 400" font-family="'Inter', sans-serif">
  <defs>
    <filter id="w9"><feTurbulence baseFrequency="0.022" numOctaves="2" seed="23"/><feDisplacementMap in="SourceGraphic" scale="1.2"/></filter>
  </defs>

  <text x="360" y="34" font-family="'Caveat', cursive" font-size="28" fill="#B388FF" text-anchor="middle">DP - fill the table once, look up forever</text>

  <!-- Grid header (j axis = "" a b c d e) -->
  <g font-family="'JetBrains Mono', monospace" font-size="14" fill="#9AA7BD" text-anchor="middle">
    <text x="100" y="80">""</text>
    <text x="160" y="80">a</text>
    <text x="220" y="80">b</text>
    <text x="280" y="80">c</text>
    <text x="340" y="80">d</text>
    <text x="400" y="80">e</text>
  </g>
  <!-- Row labels (i axis) -->
  <g font-family="'JetBrains Mono', monospace" font-size="14" fill="#9AA7BD">
    <text x="50" y="110">""</text>
    <text x="50" y="160">a</text>
    <text x="50" y="210">c</text>
    <text x="50" y="260">e</text>
  </g>

  <!-- Grid cells -->
  <g filter="url(#w9)" stroke="#9AA7BD" stroke-width="2" fill="rgba(0,0,0,0.18)">
    <rect x="80"  y="90"  width="50" height="50"/>
    <rect x="130" y="90"  width="50" height="50"/>
    <rect x="180" y="90"  width="50" height="50"/>
    <rect x="230" y="90"  width="50" height="50"/>
    <rect x="280" y="90"  width="50" height="50"/>
    <rect x="330" y="90"  width="50" height="50"/>

    <rect x="80"  y="140" width="50" height="50"/>
    <rect x="130" y="140" width="50" height="50"/>
    <rect x="180" y="140" width="50" height="50"/>
    <rect x="230" y="140" width="50" height="50"/>
    <rect x="280" y="140" width="50" height="50"/>
    <rect x="330" y="140" width="50" height="50"/>

    <rect x="80"  y="190" width="50" height="50"/>
    <rect x="130" y="190" width="50" height="50"/>
    <rect x="180" y="190" width="50" height="50"/>
    <rect x="230" y="190" width="50" height="50"/>
    <rect x="280" y="190" width="50" height="50"/>
    <rect x="330" y="190" width="50" height="50"/>

    <rect x="80"  y="240" width="50" height="50"/>
    <rect x="130" y="240" width="50" height="50"/>
    <rect x="180" y="240" width="50" height="50"/>
    <rect x="230" y="240" width="50" height="50"/>
    <rect x="280" y="240" width="50" height="50"/>
    <rect x="330" y="240" width="50" height="50"/>
  </g>

  <!-- Some values -->
  <g font-family="'JetBrains Mono', monospace" font-size="14" fill="#F4F1E8" text-anchor="middle">
    <text x="105" y="122">0</text><text x="155" y="122">1</text><text x="205" y="122">2</text><text x="255" y="122">3</text><text x="305" y="122">4</text><text x="355" y="122">5</text>
    <text x="105" y="172">1</text><text x="155" y="172" fill="#5FE388">0</text><text x="205" y="172">1</text><text x="255" y="172">2</text><text x="305" y="172">3</text><text x="355" y="172">4</text>
    <text x="105" y="222">2</text><text x="155" y="222">1</text><text x="205" y="222">1</text><text x="255" y="222" fill="#5FE388">1</text><text x="305" y="222">2</text><text x="355" y="222">3</text>
    <text x="105" y="272">3</text><text x="155" y="272">2</text><text x="205" y="272">2</text><text x="255" y="272">2</text><text x="305" y="272">2</text><text x="355" y="272" fill="#FFD93D">2</text>
  </g>

  <!-- Highlight final answer cell -->
  <rect x="330" y="240" width="50" height="50" stroke="#FFD93D" stroke-width="3" fill="rgba(255,217,61,0.18)"/>
  <text x="395" y="270" font-family="'Caveat', cursive" font-size="22" fill="#FFD93D">answer</text>

  <!-- Recurrence text -->
  <g font-family="'JetBrains Mono', monospace" font-size="14" fill="#9AA7BD">
    <text x="450" y="120">dp[i][j] =</text>
    <text x="460" y="145" fill="#5FE388">  dp[i-1][j-1]                if s1[i]==s2[j]</text>
    <text x="460" y="170" fill="#FF8C42">  1 + min(insert, delete, replace) otherwise</text>
  </g>

  <text x="460" y="220" font-family="'Caveat', cursive" font-size="22" fill="#3DD9D6">Edit distance: ace -&gt; abcde</text>

  <text x="360" y="370" font-family="'Caveat', cursive" font-size="20" fill="#9AA7BD" text-anchor="middle">recursion + memoization = same table, top-down</text>
</svg>
