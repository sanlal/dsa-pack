<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 360" font-family="'Inter', sans-serif">
  <defs>
    <filter id="wU"><feTurbulence baseFrequency="0.025" numOctaves="2" seed="31"/><feDisplacementMap in="SourceGraphic" scale="1.2"/></filter>
  </defs>

  <text x="360" y="34" font-family="'Caveat', cursive" font-size="28" fill="#B388FF" text-anchor="middle">Union-Find / Disjoint Set Union</text>

  <!-- Before -->
  <text x="180" y="76" font-family="'Caveat', cursive" font-size="22" fill="#9AA7BD" text-anchor="middle">before union(3, 6)</text>
  <g filter="url(#wU)" stroke="#9AA7BD" stroke-width="2" fill="none">
    <line x1="120" y1="125" x2="100" y2="180"/>
    <line x1="120" y1="125" x2="160" y2="180"/>
    <line x1="100" y1="200" x2="80"  y2="260"/>

    <line x1="260" y1="125" x2="240" y2="180"/>
    <line x1="240" y1="200" x2="240" y2="260"/>
  </g>
  <g stroke-width="2.5">
    <circle cx="120" cy="115" r="20" fill="#3DD9D6" stroke="#3DD9D6"/>
    <circle cx="100" cy="190" r="20" fill="rgba(61,217,214,0.30)" stroke="#3DD9D6"/>
    <circle cx="160" cy="190" r="20" fill="rgba(61,217,214,0.30)" stroke="#3DD9D6"/>
    <circle cx="80"  cy="270" r="20" fill="rgba(61,217,214,0.30)" stroke="#3DD9D6"/>

    <circle cx="260" cy="115" r="20" fill="#FF8C42" stroke="#FF8C42"/>
    <circle cx="240" cy="190" r="20" fill="rgba(255,140,66,0.30)" stroke="#FF8C42"/>
    <circle cx="240" cy="270" r="20" fill="rgba(255,140,66,0.30)" stroke="#FF8C42"/>
  </g>
  <g font-family="'JetBrains Mono', monospace" font-size="13" fill="#0F1A2E" text-anchor="middle">
    <text x="120" y="120">1</text>
    <text x="260" y="120">4</text>
  </g>
  <g font-family="'JetBrains Mono', monospace" font-size="13" fill="#F4F1E8" text-anchor="middle">
    <text x="100" y="195">2</text>
    <text x="160" y="195">3</text>
    <text x="80"  y="275">7</text>
    <text x="240" y="195">5</text>
    <text x="240" y="275">6</text>
  </g>

  <!-- Arrow -->
  <g stroke="#FFD93D" stroke-width="3" fill="none">
    <path d="M340 200 L420 200" filter="url(#wU)"/>
    <polygon points="420,200 410,194 410,206" fill="#FFD93D"/>
  </g>
  <text x="380" y="190" font-family="'Caveat', cursive" font-size="20" fill="#FFD93D" text-anchor="middle">union(3, 6)</text>

  <!-- After -->
  <text x="560" y="76" font-family="'Caveat', cursive" font-size="22" fill="#9AA7BD" text-anchor="middle">after - merged + path compression</text>
  <g filter="url(#wU)" stroke="#9AA7BD" stroke-width="2" fill="none">
    <line x1="500" y1="125" x2="460" y2="180"/>
    <line x1="500" y1="125" x2="540" y2="180"/>
    <line x1="500" y1="125" x2="620" y2="180"/>
    <line x1="460" y1="200" x2="440" y2="260"/>
    <line x1="540" y1="200" x2="560" y2="260"/>
    <line x1="620" y1="200" x2="620" y2="260"/>
  </g>
  <g stroke-width="2.5">
    <circle cx="500" cy="115" r="22" fill="#5FE388" stroke="#5FE388"/>
    <circle cx="460" cy="190" r="20" fill="rgba(95,227,136,0.30)" stroke="#5FE388"/>
    <circle cx="540" cy="190" r="20" fill="rgba(95,227,136,0.30)" stroke="#5FE388"/>
    <circle cx="620" cy="190" r="20" fill="rgba(95,227,136,0.30)" stroke="#5FE388"/>
    <circle cx="440" cy="270" r="20" fill="rgba(95,227,136,0.30)" stroke="#5FE388"/>
    <circle cx="560" cy="270" r="20" fill="rgba(95,227,136,0.30)" stroke="#5FE388"/>
    <circle cx="620" cy="270" r="20" fill="rgba(95,227,136,0.30)" stroke="#5FE388"/>
  </g>
  <g font-family="'JetBrains Mono', monospace" font-size="13" fill="#0F1A2E" text-anchor="middle">
    <text x="500" y="120">1</text>
  </g>
  <g font-family="'JetBrains Mono', monospace" font-size="13" fill="#F4F1E8" text-anchor="middle">
    <text x="460" y="195">2</text>
    <text x="540" y="195">3</text>
    <text x="620" y="195">4</text>
    <text x="440" y="275">7</text>
    <text x="560" y="275">6</text>
    <text x="620" y="275">5</text>
  </g>

  <text x="360" y="335" font-family="'JetBrains Mono', monospace" font-size="13" fill="#9AA7BD" text-anchor="middle">find + union with path compression + rank  =  ~O(alpha(n)) amortised</text>
</svg>
