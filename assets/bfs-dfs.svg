<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 380" font-family="'Inter', sans-serif">
  <defs>
    <filter id="w7"><feTurbulence baseFrequency="0.025" numOctaves="2" seed="19"/><feDisplacementMap in="SourceGraphic" scale="1.2"/></filter>
  </defs>

  <!-- BFS tree (left) -->
  <text x="180" y="40" font-family="'Caveat', cursive" font-size="26" fill="#3DD9D6" text-anchor="middle">BFS - level by level</text>
  <g filter="url(#w7)" stroke="#9AA7BD" stroke-width="2" fill="none">
    <line x1="180" y1="92"  x2="120" y2="160"/>
    <line x1="180" y1="92"  x2="240" y2="160"/>
    <line x1="120" y1="180" x2="80"  y2="250"/>
    <line x1="120" y1="180" x2="160" y2="250"/>
    <line x1="240" y1="180" x2="200" y2="250"/>
    <line x1="240" y1="180" x2="280" y2="250"/>
  </g>

  <g stroke-width="3">
    <circle cx="180" cy="80"  r="22" fill="#3DD9D6" stroke="#3DD9D6"/>
    <circle cx="120" cy="170" r="22" fill="#3DD9D6" stroke="#3DD9D6"/>
    <circle cx="240" cy="170" r="22" fill="#3DD9D6" stroke="#3DD9D6"/>
    <circle cx="80"  cy="260" r="22" fill="rgba(61,217,214,0.20)" stroke="#3DD9D6"/>
    <circle cx="160" cy="260" r="22" fill="rgba(61,217,214,0.20)" stroke="#3DD9D6"/>
    <circle cx="200" cy="260" r="22" fill="rgba(61,217,214,0.20)" stroke="#3DD9D6"/>
    <circle cx="280" cy="260" r="22" fill="rgba(61,217,214,0.20)" stroke="#3DD9D6"/>
  </g>
  <g font-family="'JetBrains Mono', monospace" font-size="13" fill="#0F1A2E" text-anchor="middle">
    <text x="180" y="85">1</text>
    <text x="120" y="175">2</text>
    <text x="240" y="175">3</text>
  </g>
  <g font-family="'JetBrains Mono', monospace" font-size="13" fill="#3DD9D6" text-anchor="middle">
    <text x="80"  y="265">4</text>
    <text x="160" y="265">5</text>
    <text x="200" y="265">6</text>
    <text x="280" y="265">7</text>
  </g>
  <text x="180" y="320" font-family="'JetBrains Mono', monospace" font-size="14" fill="#9AA7BD" text-anchor="middle">queue: 1, 2, 3, 4, 5, 6, 7</text>
  <text x="180" y="345" font-family="'Caveat', cursive" font-size="18" fill="#9AA7BD" text-anchor="middle">shortest path on unweighted graph</text>

  <!-- DFS tree (right) -->
  <text x="560" y="40" font-family="'Caveat', cursive" font-size="26" fill="#FF8C42" text-anchor="middle">DFS - go deep first</text>
  <g filter="url(#w7)" stroke="#9AA7BD" stroke-width="2" fill="none">
    <line x1="560" y1="92"  x2="500" y2="160"/>
    <line x1="560" y1="92"  x2="620" y2="160"/>
    <line x1="500" y1="180" x2="460" y2="250"/>
    <line x1="500" y1="180" x2="540" y2="250"/>
    <line x1="620" y1="180" x2="580" y2="250"/>
    <line x1="620" y1="180" x2="660" y2="250"/>
  </g>

  <g stroke-width="3">
    <circle cx="560" cy="80"  r="22" fill="#FF8C42" stroke="#FF8C42"/>
    <circle cx="500" cy="170" r="22" fill="#FF8C42" stroke="#FF8C42"/>
    <circle cx="460" cy="260" r="22" fill="#FF8C42" stroke="#FF8C42"/>
    <circle cx="540" cy="260" r="22" fill="rgba(255,140,66,0.20)" stroke="#FF8C42"/>
    <circle cx="620" cy="170" r="22" fill="rgba(255,140,66,0.20)" stroke="#FF8C42"/>
    <circle cx="580" cy="260" r="22" fill="rgba(255,140,66,0.20)" stroke="#FF8C42"/>
    <circle cx="660" cy="260" r="22" fill="rgba(255,140,66,0.20)" stroke="#FF8C42"/>
  </g>
  <g font-family="'JetBrains Mono', monospace" font-size="13" fill="#0F1A2E" text-anchor="middle">
    <text x="560" y="85">1</text>
    <text x="500" y="175">2</text>
    <text x="460" y="265">3</text>
  </g>
  <g font-family="'JetBrains Mono', monospace" font-size="13" fill="#FF8C42" text-anchor="middle">
    <text x="540" y="265">4</text>
    <text x="620" y="175">5</text>
    <text x="580" y="265">6</text>
    <text x="660" y="265">7</text>
  </g>
  <text x="560" y="320" font-family="'JetBrains Mono', monospace" font-size="14" fill="#9AA7BD" text-anchor="middle">stack: 1, 2, 3, 4, 5, 6, 7</text>
  <text x="560" y="345" font-family="'Caveat', cursive" font-size="18" fill="#9AA7BD" text-anchor="middle">connected comps, cycles, topo sort</text>
</svg>
